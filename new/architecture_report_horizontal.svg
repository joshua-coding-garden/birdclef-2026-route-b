<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1020" font-family="'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2D3748"/>
    </marker>
    <marker id="arrBig" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2D3748"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#805AD5"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C53030"/>
    </marker>
  </defs>

  <!-- ========== Title ========== -->
  <text x="750" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1A202C">
    方法架構 ‧ 從任務定位到推論的完整因果鏈
  </text>
  <text x="750" y="66" text-anchor="middle" font-size="13" fill="#718096" font-style="italic">
    Frozen pretrained embedding + lightweight linear probe  —  narrative &amp; causal view
  </text>

  <!-- ========== Narrative row: 任務 → 策略 → 預期 ========== -->
  <!-- Box 1 -->
  <rect x="30" y="96" width="420" height="148" rx="10" fill="#F7FAFC" stroke="#4A5568" stroke-width="1.6"/>
  <text x="50" y="122" font-size="14" font-weight="700" fill="#2D3748">① 任務定位</text>
  <text x="50" y="146" font-size="11.5" fill="#2D3748">
    <tspan>• 輸入:野外連續 1 分鐘錄音,切成 12 個 5 秒段</tspan>
    <tspan x="50" dy="18">• 輸出:每段對 234 類物種的存在機率(多標籤)</tspan>
    <tspan x="50" dy="18">• 評估:macro-averaged ROC-AUC</tspan>
    <tspan x="50" dy="18">• 困難:類別高度不平衡、多物種共現、</tspan>
    <tspan x="58" dy="16" fill="#718096">標註資料有限、非鳥類預訓練覆蓋低</tspan>
  </text>

  <line x1="456" y1="170" x2="500" y2="170" stroke="#2D3748" stroke-width="2.5" marker-end="url(#arrBig)"/>
  <text x="478" y="160" text-anchor="middle" font-size="11" fill="#4A5568" font-style="italic">因此</text>

  <!-- Box 2 -->
  <rect x="510" y="96" width="420" height="148" rx="10" fill="#EDF2F7" stroke="#2C5282" stroke-width="1.6"/>
  <text x="530" y="122" font-size="14" font-weight="700" fill="#2C5282">② 設計策略</text>
  <text x="530" y="146" font-size="11.5" fill="#2D3748">
    <tspan font-weight="700">凍結預訓練 backbone + 訓練輕量線性分類器。</tspan>
    <tspan x="530" dy="20">假設:Perch v2 的 1536 維 embedding 空間已</tspan>
    <tspan x="530" dy="16">編碼足夠的物種區辨資訊,234 類為其子集 →</tspan>
    <tspan x="530" dy="16" font-weight="700" fill="#2C5282">在該空間中線性可分。</tspan>
    <tspan x="530" dy="20" fill="#4A5568">只要在 embedding 上學一個 W (1536 → 234),</tspan>
    <tspan x="530" dy="16" fill="#4A5568">不需 fine-tune Perch 權重。</tspan>
  </text>

  <line x1="936" y1="170" x2="980" y2="170" stroke="#2D3748" stroke-width="2.5" marker-end="url(#arrBig)"/>
  <text x="958" y="160" text-anchor="middle" font-size="11" fill="#4A5568" font-style="italic">預期</text>

  <!-- Box 3 -->
  <rect x="990" y="96" width="480" height="148" rx="10" fill="#FFFAF0" stroke="#C05621" stroke-width="1.6"/>
  <text x="1010" y="122" font-size="14" font-weight="700" fill="#C05621">③ 預期效果與取捨</text>
  <text x="1010" y="146" font-size="11.5" fill="#2D3748">
    <tspan>• 訓練成本極低(~360k 可訓參數,分鐘級)</tspan>
    <tspan x="1010" dy="18">• 推論與提交環境一致(CPU 可跑)</tspan>
    <tspan x="1010" dy="18">• 對標 Google 公開 baseline(LB ~0.93)</tspan>
    <tspan x="1010" dy="18" fill="#C05621">• 取捨:天花板 = Perch 本身的表示能力;</tspan>
    <tspan x="1018" dy="16" fill="#718096">對 Perch 未見過的非鳥類預測能力較弱</tspan>
  </text>

  <!-- ========== Pipeline section (narrower + larger fonts) ========== -->
  <text x="750" y="290" text-anchor="middle" font-size="15" font-weight="700" fill="#2D3748">
    實際資料流  ·  訓練(上)與推論(下)共用同一個凍結 backbone
  </text>

  <!-- =============== Training lane (narrower: x=250..1250, width=1000) =============== -->
  <g>
    <rect x="250" y="310" width="1000" height="160" rx="12" fill="#FFFFFF" stroke="#3182CE" stroke-width="2"/>
    <rect x="250" y="310" width="100" height="160" rx="12" fill="#3182CE"/>
    <text x="300" y="378" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">訓練階段</text>
    <text x="300" y="400" text-anchor="middle" font-size="13" fill="#FFFFFF">Training</text>

    <!-- Input -->
    <rect x="370" y="340" width="180" height="100" rx="6" fill="#E6FFFA" stroke="#319795" stroke-width="1.5"/>
    <text x="460" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="#234E52">訓練音訊 + 標籤</text>
    <text x="460" y="388" text-anchor="middle" font-size="12" fill="#4A5568">train_audio 短錄音</text>
    <text x="460" y="407" text-anchor="middle" font-size="12" fill="#4A5568">+ soundscape 標註段</text>
    <text x="460" y="428" text-anchor="middle" font-size="11" fill="#718096" font-style="italic">multi-hot (234,)</text>

    <line x1="555" y1="390" x2="595" y2="390" stroke="#2D3748" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Perch frozen -->
    <rect x="600" y="324" width="260" height="132" rx="8" fill="#FAF5FF" stroke="#805AD5" stroke-width="2.5"/>
    <text x="730" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#44337A">Perch v2 · FROZEN</text>
    <text x="730" y="370" text-anchor="middle" font-size="11" fill="#6B46C1">Google 預訓練於 10k+ 鳥種</text>
    <line x1="616" y1="380" x2="844" y2="380" stroke="#B794F4" stroke-dasharray="2,2"/>
    <text x="730" y="400" text-anchor="middle" font-size="12" fill="#2D3748">PCEN mel-spec</text>
    <text x="730" y="420" text-anchor="middle" font-size="12" fill="#2D3748">↓ Conformer encoder</text>
    <text x="730" y="442" text-anchor="middle" font-size="13" font-weight="700" fill="#44337A">→ emb ∈ ℝ¹⁵³⁶</text>

    <line x1="865" y1="390" x2="905" y2="390" stroke="#805AD5" stroke-width="2" marker-end="url(#arrPurple)"/>
    <text x="885" y="380" text-anchor="middle" font-size="11" fill="#805AD5" font-style="italic">1536-d</text>

    <!-- Linear probe (training) -->
    <rect x="910" y="340" width="180" height="100" rx="8" fill="#FFF5F7" stroke="#D53F8C" stroke-width="2"/>
    <text x="1000" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="#702459">訓練 Linear Probe</text>
    <text x="1000" y="388" text-anchor="middle" font-size="12" fill="#2D3748">Dense(1536→234)</text>
    <text x="1000" y="407" text-anchor="middle" font-size="12" fill="#2D3748">sigmoid + BCE</text>
    <text x="1000" y="428" text-anchor="middle" font-size="11" fill="#718096" font-style="italic">~360k 參數</text>

    <line x1="1095" y1="390" x2="1135" y2="390" stroke="#2D3748" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Output: weights -->
    <rect x="1140" y="340" width="100" height="100" rx="8" fill="#FED7D7" stroke="#C53030" stroke-width="2"/>
    <text x="1190" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="#742A2A">分類器</text>
    <text x="1190" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#742A2A">權重</text>
    <text x="1190" y="405" text-anchor="middle" font-size="11" fill="#2D3748">W, b</text>
    <text x="1190" y="425" text-anchor="middle" font-size="10" fill="#C53030" font-style="italic">→ 推論用</text>
  </g>

  <!-- =============== Inference lane =============== -->
  <g>
    <rect x="250" y="494" width="1000" height="160" rx="12" fill="#FFFFFF" stroke="#38A169" stroke-width="2"/>
    <rect x="250" y="494" width="100" height="160" rx="12" fill="#38A169"/>
    <text x="300" y="562" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">推論階段</text>
    <text x="300" y="584" text-anchor="middle" font-size="13" fill="#FFFFFF">Inference</text>

    <!-- Test audio -->
    <rect x="370" y="524" width="180" height="100" rx="6" fill="#F0FFF4" stroke="#38A169" stroke-width="1.5"/>
    <text x="460" y="550" text-anchor="middle" font-size="13" font-weight="700" fill="#22543D">測試音訊</text>
    <text x="460" y="572" text-anchor="middle" font-size="12" fill="#4A5568">Pantanal 1 分鐘</text>
    <text x="460" y="591" text-anchor="middle" font-size="12" fill="#4A5568">切 12 段 × 5 秒</text>
    <text x="460" y="612" text-anchor="middle" font-size="11" fill="#718096" font-style="italic">無標籤</text>

    <line x1="555" y1="574" x2="595" y2="574" stroke="#2D3748" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Same Perch (dashed) -->
    <rect x="600" y="508" width="260" height="132" rx="8" fill="#FAF5FF" stroke="#805AD5" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="730" y="534" text-anchor="middle" font-size="14" font-weight="700" fill="#44337A">同一個 Perch v2</text>
    <text x="730" y="554" text-anchor="middle" font-size="11" fill="#6B46C1">權重相同,CPU 編譯版</text>
    <line x1="616" y1="564" x2="844" y2="564" stroke="#B794F4" stroke-dasharray="2,2"/>
    <text x="730" y="584" text-anchor="middle" font-size="12" fill="#2D3748">相同特徵空間</text>
    <text x="730" y="604" text-anchor="middle" font-size="12" fill="#2D3748">訓練/測試分布一致</text>
    <text x="730" y="626" text-anchor="middle" font-size="13" font-weight="700" fill="#44337A">→ emb ∈ ℝ¹⁵³⁶</text>

    <line x1="865" y1="574" x2="905" y2="574" stroke="#805AD5" stroke-width="2" marker-end="url(#arrPurple)"/>
    <text x="885" y="564" text-anchor="middle" font-size="11" fill="#805AD5" font-style="italic">1536-d</text>

    <!-- Apply probe -->
    <rect x="910" y="524" width="180" height="100" rx="8" fill="#FFF5F7" stroke="#D53F8C" stroke-width="2"/>
    <text x="1000" y="550" text-anchor="middle" font-size="13" font-weight="700" fill="#702459">套用 Probe</text>
    <text x="1000" y="572" text-anchor="middle" font-size="12" fill="#2D3748">p = σ(W·x + b)</text>
    <text x="1000" y="591" text-anchor="middle" font-size="12" fill="#2D3748">一次矩陣乘</text>
    <text x="1000" y="612" text-anchor="middle" font-size="11" fill="#C53030" font-style="italic">W,b 來自訓練</text>

    <line x1="1095" y1="574" x2="1135" y2="574" stroke="#2D3748" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Predictions -->
    <rect x="1140" y="524" width="100" height="100" rx="8" fill="#FED7D7" stroke="#C53030" stroke-width="2"/>
    <text x="1190" y="550" text-anchor="middle" font-size="13" font-weight="700" fill="#742A2A">234 類</text>
    <text x="1190" y="568" text-anchor="middle" font-size="13" font-weight="700" fill="#742A2A">機率</text>
    <text x="1190" y="589" text-anchor="middle" font-size="11" fill="#2D3748">每段一列</text>
    <text x="1190" y="609" text-anchor="middle" font-size="10" fill="#718096" font-style="italic">→ submission</text>
  </g>

  <!-- Cross-lane arrow -->
  <path d="M 1190 442 C 1190 468, 1000 488, 1000 520" fill="none" stroke="#C53030" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="1095" y="478" font-size="11" fill="#C53030" font-style="italic">權重複製</text>

  <!-- ================================================== -->
  <!-- Causal explanations (bottom) -->
  <!-- ================================================== -->
  <text x="750" y="708" text-anchor="middle" font-size="14" font-weight="700" fill="#2D3748">
    ④ 因果解釋  —  為什麼這個架構會 work
  </text>

  <!-- Card 1 -->
  <rect x="30" y="724" width="460" height="280" rx="10" fill="#FFFAF0" stroke="#F6AD55" stroke-width="1.5"/>
  <text x="50" y="750" font-size="13" font-weight="700" fill="#7B341E">A. 為什麼要凍結 Perch?</text>
  <text x="50" y="776" font-size="11.5" fill="#2D3748">
    <tspan>Perch 已在 10,000+ 鳥種上監督訓練,學到的</tspan>
    <tspan x="50" dy="18">1536 維 embedding 空間早已編碼</tspan>
    <tspan x="50" dy="18" font-weight="700">「物種身份所需的聲學區辨特徵」</tspan>
    <tspan x="50" dy="18">(鳴叫頻率、節奏、諧波結構等)。</tspan>
    <tspan x="50" dy="24">本比賽的 234 類只是其子集,與其花大量運算</tspan>
    <tspan x="50" dy="18">去 fine-tune 它,不如直接重用這個已學好的</tspan>
    <tspan x="50" dy="18">特徵空間。</tspan>
    <tspan x="50" dy="26" fill="#C05621" font-weight="700">好處:</tspan>
    <tspan x="50" dy="18" fill="#4A5568">• 避免在有限標註上過擬合</tspan>
    <tspan x="50" dy="18" fill="#4A5568">• 訓練從「幾天」壓到「幾分鐘」</tspan>
  </text>

  <!-- Card 2 -->
  <rect x="510" y="724" width="460" height="280" rx="10" fill="#FFFAF0" stroke="#F6AD55" stroke-width="1.5"/>
  <text x="530" y="750" font-size="13" font-weight="700" fill="#7B341E">B. 為什麼單層線性 probe 就夠?</text>
  <text x="530" y="776" font-size="11.5" fill="#2D3748">
    <tspan>一個好的 embedding 空間的本質定義是:</tspan>
    <tspan x="530" dy="18" font-weight="700">「語義相近的樣本,向量距離也相近」。</tspan>
    <tspan x="530" dy="24">如果 Perch 的 embedding 真的做到這點,</tspan>
    <tspan x="530" dy="18">不同物種在 1536 維空間中會形成區分明顯的</tspan>
    <tspan x="530" dy="18">cluster,只需一個 hyperplane 就能切開,</tspan>
    <tspan x="530" dy="18">也就是一層線性 Dense(1536→234)。</tspan>
    <tspan x="530" dy="26" fill="#C05621" font-weight="700">如果加 MLP 或 CNN 會怎樣?</tspan>
    <tspan x="530" dy="18" fill="#4A5568">• 參數量暴增 → 在有限標註上易 overfit</tspan>
    <tspan x="530" dy="18" fill="#4A5568">• 複雜 head 通常增益很小(~1-2 分)</tspan>
  </text>

  <!-- Card 3 -->
  <rect x="990" y="724" width="480" height="280" rx="10" fill="#FFFAF0" stroke="#F6AD55" stroke-width="1.5"/>
  <text x="1010" y="750" font-size="13" font-weight="700" fill="#7B341E">C. 為什麼訓練/測試要共用 Perch?</text>
  <text x="1010" y="776" font-size="11.5" fill="#2D3748">
    <tspan>Linear probe 只學到:</tspan>
    <tspan x="1010" dy="18" font-weight="700">「在這個 embedding 空間中,234 類長什麼樣」</tspan>
    <tspan x="1010" dy="24">若推論時換成別的 embedding 提取器</tspan>
    <tspan x="1010" dy="18">(例如 BirdNET、YAMNet),空間座標系不同,</tspan>
    <tspan x="1010" dy="18">probe 的 W 會指向錯誤方向,</tspan>
    <tspan x="1010" dy="18">預測幾乎等於隨機猜。</tspan>
    <tspan x="1010" dy="26" fill="#C05621" font-weight="700">因此:</tspan>
    <tspan x="1010" dy="18" fill="#4A5568">• Perch 權重在訓練/推論完全相同</tspan>
    <tspan x="1010" dy="18" fill="#4A5568">• 只是 CPU 編譯變體換過去</tspan>
    <tspan x="1010" dy="18" fill="#4A5568">• XLA 目標不同但數值幾乎相同</tspan>
  </text>

  <text x="750" y="1010" text-anchor="middle" font-size="11" fill="#A0AEC0" font-style="italic">
    圖例:綠=input,紫=frozen backbone(不訓練),粉=可訓練模組,紅=輸出
  </text>
</svg>
