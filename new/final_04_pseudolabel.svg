<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#7C3AED"/>
    </marker>
  </defs>
  <style>text{font-family:"Microsoft JhengHei","PingFang TC",sans-serif}</style>

  <text x="600" y="42" text-anchor="middle" font-size="30" font-weight="bold" fill="#1E293B">Pseudo-labeling 流程</text>

  <!-- Step 1: Labeled data -->
  <rect x="30" y="80" width="220" height="110" rx="14" fill="#2563EB"/>
  <text x="140" y="127" text-anchor="middle" font-size="22" font-weight="bold" fill="white">已標記資料</text>
  <text x="140" y="162" text-anchor="middle" font-size="20" fill="white" fill-opacity="0.8">234k 筆</text>

  <!-- Arrow -->
  <line x1="260" y1="135" x2="310" y2="135" stroke="#7C3AED" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Step 2: Train teacher -->
  <rect x="320" y="80" width="220" height="110" rx="14" fill="#059669"/>
  <text x="430" y="127" text-anchor="middle" font-size="22" font-weight="bold" fill="white">訓練 Teacher</text>
  <text x="430" y="162" text-anchor="middle" font-size="20" fill="white" fill-opacity="0.8">5-fold MLP</text>

  <!-- Arrow -->
  <line x1="550" y1="135" x2="600" y2="135" stroke="#7C3AED" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Step 3: Predict unlabeled -->
  <rect x="610" y="80" width="260" height="110" rx="14" fill="#7C3AED"/>
  <text x="740" y="122" text-anchor="middle" font-size="22" font-weight="bold" fill="white">預測未標記</text>
  <text x="740" y="155" text-anchor="middle" font-size="22" font-weight="bold" fill="white">Soundscape</text>
  <text x="740" y="180" text-anchor="middle" font-size="18" fill="white" fill-opacity="0.8">127k 筆</text>

  <!-- Arrow down -->
  <line x1="740" y1="200" x2="740" y2="250" stroke="#7C3AED" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Step 4: Soft labels -->
  <rect x="610" y="260" width="260" height="110" rx="14" fill="#D97706"/>
  <text x="740" y="307" text-anchor="middle" font-size="22" font-weight="bold" fill="white">生成 Soft Labels</text>
  <text x="740" y="342" text-anchor="middle" font-size="20" fill="white" fill-opacity="0.8">保留機率不確定性</text>

  <!-- Arrow left -->
  <line x1="600" y1="315" x2="540" y2="315" stroke="#7C3AED" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Step 5: Add to training -->
  <rect x="290" y="260" width="240" height="110" rx="14" fill="#DC2626"/>
  <text x="410" y="302" text-anchor="middle" font-size="22" font-weight="bold" fill="white">加入訓練集</text>
  <text x="410" y="337" text-anchor="middle" font-size="20" fill="white" fill-opacity="0.8">僅訓練，不進驗證</text>

  <!-- Arrow left -->
  <line x1="280" y1="315" x2="260" y2="315" stroke="#7C3AED" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Step 6: Retrain -->
  <rect x="30" y="260" width="220" height="110" rx="14" fill="#059669"/>
  <text x="140" y="307" text-anchor="middle" font-size="22" font-weight="bold" fill="white">重新訓練</text>
  <text x="140" y="342" text-anchor="middle" font-size="20" fill="white" fill-opacity="0.8">更強的模型</text>
</svg>
