<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1020" font-family="'Segoe UI', 'Microsoft JhengHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A5568"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#805AD5"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C53030"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">
    Phase 1 · Perch Embedding Extraction(中文詳細版)
  </text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#718096">
    Kaggle GPU · perch_v2_gpu(凍結)· 把音訊壓成 1536 維向量供 Phase 2 linear probe 使用
  </text>

  <!-- Column headers -->
  <text x="155" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#2D3748">INPUT · 來自 Kaggle 比賽資料</text>
  <text x="550" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#2D3748">PROCESSING · Python 前處理 + Perch 模型</text>
  <text x="960" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#2D3748">OUTPUT · 存在 /kaggle/working/</text>

  <!-- ============ INPUT BOXES ============ -->
  <!-- A: train_audio -->
  <rect x="30" y="118" width="250" height="180" rx="8" fill="#E6FFFA" stroke="#319795" stroke-width="1.8"/>
  <text x="155" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#234E52">A · train_audio(鳥叫短錄音)</text>
  <line x1="50" y1="150" x2="260" y2="150" stroke="#B2F5EA"/>
  <text x="44" y="170" font-size="11" fill="#2D3748">• 35,549 個 .ogg 音檔</text>
  <text x="44" y="188" font-size="11" fill="#2D3748">• Xeno-Canto / iNaturalist 使用者上傳</text>
  <text x="44" y="206" font-size="11" fill="#2D3748">• 已預先重取樣到 32 kHz</text>
  <text x="44" y="224" font-size="11" fill="#2D3748">• 每檔以「1 個主物種」為主</text>
  <text x="44" y="242" font-size="11" fill="#2D3748">• 長度不一,從 3 秒到數分鐘都有</text>
  <text x="44" y="260" font-size="11" fill="#2D3748">• train.csv 提供 primary_label</text>
  <text x="44" y="278" font-size="11" fill="#2D3748">  與 secondary_labels(可能為空)</text>
  <text x="155" y="293" text-anchor="middle" font-size="10" fill="#718096" font-style="italic">總容量約 11 GB</text>

  <!-- B: train_soundscapes -->
  <rect x="30" y="318" width="250" height="170" rx="8" fill="#E6FFFA" stroke="#319795" stroke-width="1.8"/>
  <text x="155" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#234E52">B · train_soundscapes(野外長錄音)</text>
  <line x1="50" y1="350" x2="260" y2="350" stroke="#B2F5EA"/>
  <text x="44" y="370" font-size="11" fill="#2D3748">• 10,658 個 60 秒野外錄音</text>
  <text x="44" y="388" font-size="11" fill="#2D3748">• 1,478 個 5 秒段有專家多標籤</text>
  <text x="44" y="406" font-size="11" fill="#2D3748">• 同一段可能含多物種同時鳴叫</text>
  <text x="44" y="424" font-size="11" fill="#2D3748">• 標籤格式:分號分隔</text>
  <text x="44" y="442" font-size="11" fill="#2D3748">  例 "22961;23158;24321"</text>
  <text x="44" y="460" font-size="11" fill="#2D3748">• 補足 train_audio 缺的 28 個物種</text>
  <text x="155" y="478" text-anchor="middle" font-size="10" fill="#718096" font-style="italic">對非鳥類訓練特別關鍵</text>

  <!-- taxonomy.csv -->
  <rect x="30" y="508" width="250" height="130" rx="8" fill="#E6FFFA" stroke="#319795" stroke-width="1.8"/>
  <text x="155" y="530" text-anchor="middle" font-size="14" font-weight="700" fill="#234E52">taxonomy.csv(物種對照表)</text>
  <line x1="50" y1="540" x2="260" y2="540" stroke="#B2F5EA"/>
  <text x="44" y="560" font-size="11" fill="#2D3748">• 234 個目標物種(預測類別數)</text>
  <text x="44" y="578" font-size="11" fill="#2D3748">• 組成:鳥 162 · 兩棲 35 · 昆蟲 28</text>
  <text x="44" y="596" font-size="11" fill="#2D3748">         · 哺乳 8 · 爬蟲 1</text>
  <text x="44" y="614" font-size="11" fill="#2D3748">• 建立 primary_label ↔ 0..233</text>
  <text x="44" y="628" font-size="11" fill="#718096">  索引映射(species_to_idx)</text>

  <!-- ============ PROCESSING BOXES ============ -->
  <!-- ① Preprocess -->
  <rect x="320" y="118" width="460" height="160" rx="8" fill="#FEFCBF" stroke="#D69E2E" stroke-width="1.8"/>
  <text x="550" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#744210">① Preprocess(Python 逐檔處理)</text>
  <line x1="340" y1="150" x2="760" y2="150" stroke="#FAF089"/>
  <text x="336" y="170" font-size="11" fill="#2D3748">• read audio:用 soundfile.read() 讀 .ogg → numpy float32</text>
  <text x="336" y="188" font-size="11" fill="#2D3748">• stereo→mono:若是立體聲,取左右聲道平均合成單聲道</text>
  <text x="336" y="206" font-size="11" fill="#2D3748">• slice 5-sec frames:每 160,000 samples(=32 kHz × 5 秒)一塊</text>
  <text x="336" y="224" font-size="11" fill="#2D3748">• pad if &lt; 5s:整個檔不到 5 秒就補零到 160,000 samples</text>
  <text x="336" y="242" font-size="11" fill="#2D3748">• drop tail:超過的殘餘(例:檔長 23 秒 → 4 frames,丟棄後 3 秒)</text>
  <text x="336" y="260" font-size="11" fill="#2D3748">• build labels:primary + secondary → 234 維 multi-hot 向量</text>
  <text x="550" y="274" text-anchor="middle" font-size="10" fill="#744210" font-style="italic">同一檔的每個 frame 共用該檔的 label(baseline 假設)</text>

  <!-- ② Batch Buffer -->
  <rect x="320" y="298" width="460" height="128" rx="8" fill="#FFF5F5" stroke="#E53E3E" stroke-width="1.8"/>
  <text x="550" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#822727">② Batch Buffer(批次緩衝區,BATCH_SIZE=32)</text>
  <line x1="340" y1="330" x2="760" y2="330" stroke="#FED7D7"/>
  <text x="336" y="350" font-size="11" fill="#2D3748">• 把每個 5 秒 frame 暫存到 Python list,不立刻送 GPU</text>
  <text x="336" y="368" font-size="11" fill="#2D3748">• 累積到 32 個才 flush → 一次 model.batch_embed()</text>
  <text x="336" y="386" font-size="11" fill="#2D3748">• 為什麼要固定大小?XLA 編譯器對每個沒見過的 tensor shape</text>
  <text x="336" y="404" font-size="11" fill="#2D3748">  都會重編譯(~3-5 秒),不 batch 會卡在重複編譯</text>
  <text x="550" y="420" text-anchor="middle" font-size="10" fill="#822727" font-style="italic">迴圈結束時殘餘也 flush(最後一個 batch 可能 &lt; 32)</text>

  <!-- ③ Perch -->
  <rect x="320" y="446" width="460" height="248" rx="10" fill="#FAF5FF" stroke="#805AD5" stroke-width="2.5"/>
  <text x="550" y="470" text-anchor="middle" font-size="15" font-weight="700" fill="#44337A">③ Perch v2 GPU · 凍結不訓練</text>
  <text x="550" y="488" text-anchor="middle" font-size="11" fill="#6B46C1">Google DeepMind 開源鳥鳴分類器 · XLA CUDA 編譯版</text>
  <line x1="340" y1="500" x2="760" y2="500" stroke="#B794F4" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="336" y="520" font-size="11" fill="#2D3748">• 預訓練於 10,000+ 鳥類物種(Xeno-Canto + iNaturalist)</text>
  <text x="336" y="538" font-size="11" fill="#2D3748">• 我們不改它的權重,純當 feature extractor</text>
  <line x1="340" y1="548" x2="760" y2="548" stroke="#E9D8FD"/>
  <text x="550" y="568" text-anchor="middle" font-size="11" fill="#2D3748">模型內部流水線:</text>
  <rect x="340" y="578" width="420" height="26" rx="4" fill="#FFFFFF" stroke="#D6BCFA"/>
  <text x="550" y="596" text-anchor="middle" font-size="11" fill="#2D3748">輸入:audio (B=32, 160000) · float32</text>
  <rect x="340" y="608" width="420" height="26" rx="4" fill="#FFFFFF" stroke="#D6BCFA"/>
  <text x="550" y="626" text-anchor="middle" font-size="11" fill="#2D3748">↓ PCEN mel-spectrogram(聲學特有的動態範圍正規化)</text>
  <rect x="340" y="638" width="420" height="26" rx="4" fill="#FFFFFF" stroke="#D6BCFA"/>
  <text x="550" y="656" text-anchor="middle" font-size="11" fill="#2D3748">↓ Conformer / EfficientNet 混合 encoder</text>
  <rect x="340" y="668" width="420" height="22" rx="4" fill="#F0FFF4" stroke="#9AE6B4"/>
  <text x="550" y="683" text-anchor="middle" font-size="11" font-weight="700" fill="#22543D">輸出:embedding (B, 1536)</text>

  <!-- ============ OUTPUT BOXES ============ -->
  <!-- Output A -->
  <rect x="820" y="118" width="340" height="298" rx="8" fill="#FED7D7" stroke="#C53030" stroke-width="1.8"/>
  <text x="990" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#742A2A">A → train_audio_*</text>
  <line x1="840" y1="150" x2="1140" y2="150" stroke="#FEB2B2"/>

  <rect x="835" y="162" width="310" height="72" rx="4" fill="#FFFFFF" stroke="#FEB2B2"/>
  <text x="990" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">embeddings.npy</text>
  <text x="844" y="198" font-size="11" fill="#2D3748">• shape: (N, 1536) · dtype float32</text>
  <text x="844" y="216" font-size="11" fill="#2D3748">• N ≈ 140,000(35k 檔 × 平均 4 frames)</text>
  <text x="844" y="230" font-size="10" fill="#718096">  每列 = 一個 5 秒 frame 的 Perch 向量</text>

  <rect x="835" y="240" width="310" height="72" rx="4" fill="#FFFFFF" stroke="#FEB2B2"/>
  <text x="990" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">labels.npy</text>
  <text x="844" y="276" font-size="11" fill="#2D3748">• shape: (N, 234) · dtype float32</text>
  <text x="844" y="294" font-size="11" fill="#2D3748">• multi-hot: 1.0 表示該物種出現</text>
  <text x="844" y="308" font-size="10" fill="#718096">  primary + secondary 一起編碼</text>

  <rect x="835" y="318" width="310" height="72" rx="4" fill="#FFFFFF" stroke="#FEB2B2"/>
  <text x="990" y="336" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">meta.parquet</text>
  <text x="844" y="354" font-size="11" fill="#2D3748">• 欄位: filename, frame_idx</text>
  <text x="844" y="372" font-size="11" fill="#2D3748">• 對照第 i 列的 embedding 來自哪個檔</text>
  <text x="844" y="386" font-size="10" fill="#718096">  debug / 取樣檢查用</text>

  <text x="990" y="408" text-anchor="middle" font-size="11" fill="#742A2A" font-style="italic">合計約 1.5 GB</text>

  <!-- Output B -->
  <rect x="820" y="436" width="340" height="232" rx="8" fill="#FED7D7" stroke="#C53030" stroke-width="1.8"/>
  <text x="990" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#742A2A">B → soundscape_*</text>
  <line x1="840" y1="468" x2="1140" y2="468" stroke="#FEB2B2"/>

  <rect x="835" y="480" width="310" height="72" rx="4" fill="#FFFFFF" stroke="#FEB2B2"/>
  <text x="990" y="498" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">embeddings.npy</text>
  <text x="844" y="516" font-size="11" fill="#2D3748">• shape: (1478, 1536)</text>
  <text x="844" y="534" font-size="11" fill="#2D3748">• 每列 = 一個標註 5s segment 的向量</text>
  <text x="844" y="548" font-size="10" fill="#718096">  含 train_audio 沒涵蓋的 28 個物種</text>

  <rect x="835" y="558" width="310" height="72" rx="4" fill="#FFFFFF" stroke="#FEB2B2"/>
  <text x="990" y="576" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">labels.npy</text>
  <text x="844" y="594" font-size="11" fill="#2D3748">• shape: (1478, 234)</text>
  <text x="844" y="612" font-size="11" fill="#2D3748">• multi-hot(同一段可能含多物種)</text>
  <text x="844" y="626" font-size="10" fill="#718096">  例 "22961;23158" → 兩個 1.0</text>

  <text x="990" y="652" text-anchor="middle" font-size="11" fill="#742A2A" font-style="italic">合計約 11 MB(量小但對非鳥物種關鍵)</text>

  <!-- ============ ARROWS ============ -->
  <path d="M 280 200 L 317 200" fill="none" stroke="#4A5568" stroke-width="1.8" marker-end="url(#arr)"/>
  <path d="M 280 400 L 317 210" fill="none" stroke="#4A5568" stroke-width="1.8" marker-end="url(#arr)"/>
  <path d="M 280 570 L 317 220" fill="none" stroke="#4A5568" stroke-width="1.8" marker-end="url(#arr)"/>

  <line x1="550" y1="280" x2="550" y2="296" stroke="#4A5568" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="428" x2="550" y2="444" stroke="#805AD5" stroke-width="2" marker-end="url(#arrP)"/>

  <path d="M 780 580 C 800 580, 800 260, 818 260" fill="none" stroke="#C53030" stroke-width="1.5" marker-end="url(#arrR)"/>
  <path d="M 780 580 C 800 580, 800 540, 818 540" fill="none" stroke="#C53030" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- ============ Phase Roadmap footer ============ -->
  <rect x="30" y="760" width="1140" height="102" rx="10" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="50" y="786" font-size="13" font-weight="700" fill="#2D3748">整體流程(Phase 0 → 3)</text>
  <text x="50" y="810" font-size="11" fill="#4A5568">
    <tspan font-weight="700" fill="#2D3748">Phase 0</tspan>
    <tspan fill="#A0AEC0">  本機環境驗證(已完成) </tspan>
    <tspan fill="#A0AEC0">→</tspan>
    <tspan font-weight="700" fill="#805AD5"> Phase 1 · 目前</tspan>
    <tspan fill="#A0AEC0"> Kaggle GPU 抽 embedding(本圖) </tspan>
  </text>
  <text x="50" y="830" font-size="11" fill="#4A5568">
    <tspan fill="#A0AEC0">→</tspan>
    <tspan font-weight="700" fill="#2D3748"> Phase 2</tspan>
    <tspan fill="#A0AEC0"> 訓練 Dense(234) linear probe(只訓練一個線性分類器,幾分鐘) </tspan>
  </text>
  <text x="50" y="850" font-size="11" fill="#4A5568">
    <tspan fill="#A0AEC0">→</tspan>
    <tspan font-weight="700" fill="#2D3748"> Phase 3</tspan>
    <tspan fill="#A0AEC0"> Kaggle submission 用 CPU 版 Perch + 訓練好的 probe 做推論</tspan>
  </text>

  <!-- Key insight -->
  <rect x="30" y="880" width="1140" height="120" rx="10" fill="#FFFAF0" stroke="#F6AD55"/>
  <text x="50" y="906" font-size="13" font-weight="700" fill="#7B341E">核心觀念 · 為什麼這樣做</text>
  <text x="50" y="930" font-size="11" fill="#2D3748">
    <tspan font-weight="700">1. Perch 凍結:</tspan>
    <tspan>Google 已經在 10k+ 物種訓練過它,embedding 對鳥類有很好的表示能力。fine-tune 它需大量算力且容易過擬合</tspan>
  </text>
  <text x="50" y="950" font-size="11" fill="#2D3748">
    <tspan font-weight="700">2. Linear probe 輕量:</tspan>
    <tspan>下一階段只需學一個 Dense(1536 → 234, sigmoid) 線性層,參數量 ~360k,CPU 也能秒級訓完,不怕過擬合</tspan>
  </text>
  <text x="50" y="970" font-size="11" fill="#2D3748">
    <tspan font-weight="700">3. 離線抽 embedding:</tspan>
    <tspan>把「慢的部分(Perch 前向)」只做一次存成 .npy,之後 Phase 2 可反覆實驗不同的 head 架構、loss、切分</tspan>
  </text>
  <text x="50" y="990" font-size="11" fill="#2D3748">
    <tspan font-weight="700">4. Kaggle 分兩 notebook:</tspan>
    <tspan>本 notebook 只跑一次(commit 後產出 dataset),Phase 2 的 notebook 輕量、可多次改進,不重複抽 embedding</tspan>
  </text>
</svg>
