<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" font-family="'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2D3748"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B46C1"/>
    </marker>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#B83280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="48" text-anchor="middle" font-size="30" font-weight="700" fill="#1A202C">
    Route B · Frozen Perch v2 + Trainable MLP Head
  </text>
  <text x="800" y="80" text-anchor="middle" font-size="18" fill="#718096">
    訓練與推論共用同一個凍結 encoder,只訓 MLP head(~1.57M 參數)
  </text>

  <!-- ============ INPUT ============ -->
  <g>
    <rect x="30" y="280" width="200" height="190" rx="14" fill="#E6FFFA" stroke="#319795" stroke-width="3"/>
    <text x="130" y="316" text-anchor="middle" font-size="22" font-weight="700" fill="#234E52">INPUT</text>
    <line x1="55" y1="330" x2="205" y2="330" stroke="#81E6D9"/>
    <text x="130" y="360" text-anchor="middle" font-size="18" fill="#2D3748">5 秒音訊</text>
    <text x="130" y="388" text-anchor="middle" font-size="16" fill="#4A5568">32 kHz mono</text>
    <text x="130" y="412" text-anchor="middle" font-size="16" fill="#4A5568">160,000 samples</text>
    <text x="130" y="446" text-anchor="middle" font-size="14" fill="#718096" font-style="italic">(波形)</text>
  </g>

  <!-- Arrow 1: Input → Perch -->
  <line x1="232" y1="375" x2="286" y2="375" stroke="#2D3748" stroke-width="3" marker-end="url(#arr)"/>

  <!-- ============ PERCH (expanded) ============ -->
  <g>
    <rect x="290" y="130" width="440" height="540" rx="16" fill="#FAF5FF" stroke="#6B46C1" stroke-width="3.5"/>

    <!-- Header -->
    <rect x="290" y="130" width="440" height="50" rx="16" fill="#6B46C1"/>
    <text x="510" y="163" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">
      Perch v2  ·  FROZEN
    </text>
    <text x="510" y="205" text-anchor="middle" font-size="14" fill="#6B46C1" font-style="italic">
      Google 預訓練 · 10,000+ 鳥種 · ~30M+ 參數(不訓練)
    </text>

    <!-- Component 1: PCEN mel-spec -->
    <rect x="320" y="225" width="380" height="90" rx="8" fill="#FFFFFF" stroke="#B794F4" stroke-width="2"/>
    <text x="510" y="253" text-anchor="middle" font-size="19" font-weight="700" fill="#44337A">
      ① PCEN mel-spectrogram
    </text>
    <text x="510" y="278" text-anchor="middle" font-size="14" fill="#4A5568">
      波形 → 時頻圖(500 × 128)
    </text>
    <text x="510" y="300" text-anchor="middle" font-size="13" fill="#718096" font-style="italic">
      Per-Channel Energy Norm:自動處理背景噪音
    </text>

    <line x1="510" y1="318" x2="510" y2="340" stroke="#6B46C1" stroke-width="2.5" marker-end="url(#arrP)"/>

    <!-- Component 2: Conformer -->
    <rect x="320" y="345" width="380" height="110" rx="8" fill="#FFFFFF" stroke="#B794F4" stroke-width="2"/>
    <text x="510" y="373" text-anchor="middle" font-size="19" font-weight="700" fill="#44337A">
      ② Conformer Encoder Blocks
    </text>
    <text x="510" y="398" text-anchor="middle" font-size="14" fill="#2D3748">
      Convolution(局部)+ Self-Attention(長距離)
    </text>
    <text x="510" y="420" text-anchor="middle" font-size="13" fill="#4A5568">
      多層堆疊,學習物種區辨的聲學特徵
    </text>
    <text x="510" y="442" text-anchor="middle" font-size="12" fill="#718096" font-style="italic">
      Gulati et al. 2020,音訊領域 SOTA 架構
    </text>

    <line x1="510" y1="458" x2="510" y2="480" stroke="#6B46C1" stroke-width="2.5" marker-end="url(#arrP)"/>

    <!-- Component 3: Pooling -->
    <rect x="320" y="485" width="380" height="70" rx="8" fill="#FFFFFF" stroke="#B794F4" stroke-width="2"/>
    <text x="510" y="512" text-anchor="middle" font-size="19" font-weight="700" fill="#44337A">
      ③ Temporal Pooling
    </text>
    <text x="510" y="538" text-anchor="middle" font-size="14" fill="#4A5568">
      壓縮時間軸 → 單一向量
    </text>

    <!-- Output label -->
    <rect x="320" y="580" width="380" height="60" rx="8" fill="#EDF2F7" stroke="#6B46C1" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="510" y="610" text-anchor="middle" font-size="20" font-weight="700" fill="#44337A">
      embedding ∈ ℝ¹⁵³⁶
    </text>
    <text x="510" y="632" text-anchor="middle" font-size="13" fill="#718096" font-style="italic">
      1536 維特徵向量
    </text>
  </g>

  <!-- Arrow 2: Perch → MLP -->
  <line x1="732" y1="610" x2="780" y2="610" stroke="#6B46C1" stroke-width="3.5" marker-end="url(#arrP)"/>
  <line x1="780" y1="610" x2="780" y2="375" stroke="#6B46C1" stroke-width="3.5"/>
  <line x1="780" y1="375" x2="828" y2="375" stroke="#6B46C1" stroke-width="3.5" marker-end="url(#arrP)"/>

  <!-- ============ MLP HEAD (expanded) ============ -->
  <g>
    <rect x="830" y="130" width="440" height="540" rx="16" fill="#FFF5F7" stroke="#B83280" stroke-width="3.5"/>

    <!-- Header -->
    <rect x="830" y="130" width="440" height="50" rx="16" fill="#B83280"/>
    <text x="1050" y="163" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">
      MLP Head  ·  TRAINED
    </text>
    <text x="1050" y="205" text-anchor="middle" font-size="14" fill="#B83280" font-style="italic">
      自訂設計 · 1,567,338 可訓練參數
    </text>

    <!-- Layer 1 -->
    <rect x="860" y="225" width="380" height="90" rx="8" fill="#FFFFFF" stroke="#F687B3" stroke-width="2"/>
    <text x="1050" y="252" text-anchor="middle" font-size="18" font-weight="700" fill="#702459">
      Layer 1:  Linear(1536 → 768)
    </text>
    <text x="1050" y="278" text-anchor="middle" font-size="14" fill="#2D3748">
      + BatchNorm + ReLU + Dropout(0.3)
    </text>
    <text x="1050" y="300" text-anchor="middle" font-size="12" fill="#718096" font-style="italic">
      BN 穩定訓練 · Dropout 抗過擬合
    </text>

    <line x1="1050" y1="318" x2="1050" y2="340" stroke="#B83280" stroke-width="2.5" marker-end="url(#arrM)"/>

    <!-- Layer 2 -->
    <rect x="860" y="345" width="380" height="80" rx="8" fill="#FFFFFF" stroke="#F687B3" stroke-width="2"/>
    <text x="1050" y="372" text-anchor="middle" font-size="18" font-weight="700" fill="#702459">
      Layer 2:  Linear(768 → 384)
    </text>
    <text x="1050" y="398" text-anchor="middle" font-size="14" fill="#2D3748">
      + ReLU + Dropout(0.3)
    </text>
    <text x="1050" y="416" text-anchor="middle" font-size="12" fill="#718096" font-style="italic">
      ReLU 提供非線性
    </text>

    <line x1="1050" y1="428" x2="1050" y2="450" stroke="#B83280" stroke-width="2.5" marker-end="url(#arrM)"/>

    <!-- Layer 3 -->
    <rect x="860" y="455" width="380" height="80" rx="8" fill="#FFFFFF" stroke="#F687B3" stroke-width="2"/>
    <text x="1050" y="482" text-anchor="middle" font-size="18" font-weight="700" fill="#702459">
      Layer 3:  Linear(384 → 234)
    </text>
    <text x="1050" y="508" text-anchor="middle" font-size="14" fill="#2D3748">
      + sigmoid
    </text>
    <text x="1050" y="526" text-anchor="middle" font-size="12" fill="#718096" font-style="italic">
      輸出 234 類機率(multi-label)
    </text>

    <line x1="1050" y1="538" x2="1050" y2="560" stroke="#B83280" stroke-width="2.5" marker-end="url(#arrM)"/>

    <!-- Output label -->
    <rect x="860" y="565" width="380" height="65" rx="8" fill="#FED7E2" stroke="#B83280" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="1050" y="597" text-anchor="middle" font-size="20" font-weight="700" fill="#702459">
      probs ∈ [0, 1]²³⁴
    </text>
    <text x="1050" y="620" text-anchor="middle" font-size="13" fill="#718096" font-style="italic">
      每類獨立機率(BCE / Focal Loss)
    </text>
  </g>

  <!-- Arrow 3: MLP → Output -->
  <line x1="1272" y1="375" x2="1326" y2="375" stroke="#2D3748" stroke-width="3" marker-end="url(#arr)"/>

  <!-- ============ OUTPUT ============ -->
  <g>
    <rect x="1330" y="280" width="240" height="190" rx="14" fill="#FED7D7" stroke="#C53030" stroke-width="3"/>
    <text x="1450" y="316" text-anchor="middle" font-size="22" font-weight="700" fill="#742A2A">OUTPUT</text>
    <line x1="1355" y1="330" x2="1545" y2="330" stroke="#FEB2B2"/>
    <text x="1450" y="362" text-anchor="middle" font-size="18" fill="#2D3748">234 類機率</text>
    <text x="1450" y="390" text-anchor="middle" font-size="16" fill="#4A5568">multi-label</text>
    <text x="1450" y="414" text-anchor="middle" font-size="16" fill="#4A5568">每 5 秒段一列</text>
    <text x="1450" y="446" text-anchor="middle" font-size="14" fill="#718096" font-style="italic">(submission.csv)</text>
  </g>

  <!-- ============ Footer: Legend ============ -->
  <g>
    <rect x="30" y="710" width="1540" height="70" rx="10" fill="#F7FAFC" stroke="#E2E8F0"/>

    <rect x="55" y="728" width="22" height="22" rx="4" fill="#FAF5FF" stroke="#6B46C1" stroke-width="2.5"/>
    <text x="86" y="745" font-size="16" font-weight="700" fill="#44337A">紫色 = Frozen</text>
    <text x="86" y="765" font-size="13" fill="#718096">Perch 權重固定不訓練</text>

    <rect x="340" y="728" width="22" height="22" rx="4" fill="#FFF5F7" stroke="#B83280" stroke-width="2.5"/>
    <text x="371" y="745" font-size="16" font-weight="700" fill="#702459">粉色 = Trained</text>
    <text x="371" y="765" font-size="13" fill="#718096">MLP head 為可訓練模組</text>

    <text x="680" y="745" font-size="16" font-weight="700" fill="#2D3748">核心概念</text>
    <text x="680" y="765" font-size="13" fill="#4A5568">Transfer Learning:重用大規模 pretrained 特徵 + 任務特化輕量 head</text>

    <text x="1180" y="745" font-size="16" font-weight="700" fill="#C05621">訓練 vs 推論</text>
    <text x="1180" y="765" font-size="13" fill="#4A5568">兩階段共用這條 pipeline,只有 head 權重被學習</text>
  </g>
</svg>
