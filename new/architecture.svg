<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="'Segoe UI', 'Helvetica', 'Microsoft JhengHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A5568"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#805AD5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">
    BirdCLEF+ 2026 — Phase 1: Perch Embedding Extraction
  </text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#718096">
    Kaggle GPU (P100) · perch_v2_gpu · TF 2.20 · fixed batch=32
  </text>

  <!-- Column headers -->
  <text x="120" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2D3748">INPUTS (Kaggle Dataset)</text>
  <text x="500" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2D3748">PROCESSING (Python + Perch)</text>
  <text x="880" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2D3748">OUTPUTS (/kaggle/working/)</text>

  <!-- ========== INPUTS (left) ========== -->
  <g>
    <rect x="20" y="110" width="200" height="60" rx="6" fill="#E6FFFA" stroke="#319795" stroke-width="1.5"/>
    <text x="120" y="133" text-anchor="middle" font-size="13" font-weight="600" fill="#234E52">train.csv</text>
    <text x="120" y="152" text-anchor="middle" font-size="11" fill="#4A5568">35,549 rows · primary + secondary</text>

    <rect x="20" y="200" width="200" height="60" rx="6" fill="#E6FFFA" stroke="#319795" stroke-width="1.5"/>
    <text x="120" y="223" text-anchor="middle" font-size="13" font-weight="600" fill="#234E52">train_audio/*.ogg</text>
    <text x="120" y="242" text-anchor="middle" font-size="11" fill="#4A5568">35,549 files · 32 kHz · ~11 GB</text>

    <rect x="20" y="290" width="200" height="60" rx="6" fill="#E6FFFA" stroke="#319795" stroke-width="1.5"/>
    <text x="120" y="313" text-anchor="middle" font-size="13" font-weight="600" fill="#234E52">taxonomy.csv</text>
    <text x="120" y="332" text-anchor="middle" font-size="11" fill="#4A5568">234 species (162 鳥 + 72 其他)</text>

    <rect x="20" y="380" width="200" height="60" rx="6" fill="#E6FFFA" stroke="#319795" stroke-width="1.5"/>
    <text x="120" y="403" text-anchor="middle" font-size="13" font-weight="600" fill="#234E52">train_soundscapes_labels.csv</text>
    <text x="120" y="422" text-anchor="middle" font-size="11" fill="#4A5568">1,478 segments · 5s · multi-label</text>

    <rect x="20" y="470" width="200" height="60" rx="6" fill="#E6FFFA" stroke="#319795" stroke-width="1.5"/>
    <text x="120" y="493" text-anchor="middle" font-size="13" font-weight="600" fill="#234E52">train_soundscapes/*.ogg</text>
    <text x="120" y="512" text-anchor="middle" font-size="11" fill="#4A5568">10,658 files (60s each)</text>
  </g>

  <!-- ========== PROCESSING (middle) ========== -->
  <g>
    <!-- Cell 4 -->
    <rect x="280" y="110" width="440" height="92" rx="6" fill="#EBF8FF" stroke="#3182CE" stroke-width="1.5"/>
    <text x="296" y="132" font-size="12" font-weight="700" fill="#2C5282">Cell 4 — metadata + label helpers</text>
    <text x="296" y="152" font-size="11" fill="#2D3748">• species_to_idx: primary_label → 0..233</text>
    <text x="296" y="170" font-size="11" fill="#2D3748">• multi_hot_from_row(): primary + secondary → (234,)</text>
    <text x="296" y="188" font-size="11" fill="#2D3748">• multi_hot_from_soundscape(): "a;b;c" → (234,)</text>

    <!-- Cell 5 header box -->
    <rect x="280" y="226" width="440" height="26" rx="4" fill="#FEFCBF" stroke="#D69E2E" stroke-width="1.5"/>
    <text x="500" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#744210">
      Cell 5/6 — per-file loop: read · mono · frame (len // 5s) · pad
    </text>

    <!-- Buffer -->
    <rect x="280" y="268" width="440" height="46" rx="4" fill="#FFF5F5" stroke="#E53E3E" stroke-width="1.3"/>
    <text x="500" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#822727">
      Buffer (BATCH_SIZE = 32)
    </text>
    <text x="500" y="304" text-anchor="middle" font-size="10" fill="#4A5568">
      accumulate 5s windows → flush when full → fixed XLA shape, no recompile
    </text>

    <!-- Perch v2 GPU -->
    <rect x="280" y="332" width="440" height="180" rx="8" fill="#FAF5FF" stroke="#805AD5" stroke-width="2.5"/>
    <text x="500" y="357" text-anchor="middle" font-size="15" font-weight="700" fill="#44337A">
      Perch v2 GPU  (pretrained · FROZEN)
    </text>
    <text x="500" y="376" text-anchor="middle" font-size="11" fill="#6B46C1">
      Google DeepMind · trained on 10k+ bird species · XLA/CUDA
    </text>
    <line x1="300" y1="388" x2="700" y2="388" stroke="#805AD5" stroke-dasharray="3,3" opacity="0.6"/>

    <rect x="300" y="400" width="400" height="28" rx="3" fill="#FFFFFF" stroke="#B794F4"/>
    <text x="500" y="419" text-anchor="middle" font-size="11" fill="#2D3748">
      audio  (B, 160000) · float32 · 32 kHz  →  PCEN mel-spectrogram  (B, 500, 128)
    </text>
    <rect x="300" y="434" width="400" height="28" rx="3" fill="#FFFFFF" stroke="#B794F4"/>
    <text x="500" y="453" text-anchor="middle" font-size="11" fill="#2D3748">
      →  EfficientNet-style encoder  →  embedding  (B, 1536)
    </text>
    <rect x="300" y="468" width="400" height="28" rx="3" fill="#F7FAFC" stroke="#CBD5E0"/>
    <text x="500" y="487" text-anchor="middle" font-size="10" fill="#718096">
      also outputs: 14,795-class logits + spatial_embedding + spectrogram  (忽略)
    </text>

    <!-- API -->
    <text x="500" y="530" text-anchor="middle" font-size="10" fill="#805AD5" font-style="italic">
      via  perch_hoplite.model.batch_embed()  →  out.embeddings[:, 0, 0, :]
    </text>

    <!-- Write output -->
    <rect x="280" y="548" width="440" height="36" rx="4" fill="#FFF5F7" stroke="#D53F8C" stroke-width="1.3"/>
    <text x="500" y="570" text-anchor="middle" font-size="12" font-weight="700" fill="#702459">
      Cell 7 — np.save(...) + pd.to_parquet(...)
    </text>
  </g>

  <!-- ========== OUTPUTS (right) ========== -->
  <g>
    <rect x="780" y="110" width="200" height="66" rx="6" fill="#FED7D7" stroke="#C53030" stroke-width="1.5"/>
    <text x="880" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">train_audio_embeddings</text>
    <text x="880" y="147" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">.npy</text>
    <text x="880" y="165" text-anchor="middle" font-size="10" fill="#4A5568">(N ≈ 140k, 1536) ~1-2 GB</text>

    <rect x="780" y="200" width="200" height="66" rx="6" fill="#FED7D7" stroke="#C53030" stroke-width="1.5"/>
    <text x="880" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">train_audio_labels</text>
    <text x="880" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">.npy</text>
    <text x="880" y="255" text-anchor="middle" font-size="10" fill="#4A5568">(N, 234) multi-hot · ~130 MB</text>

    <rect x="780" y="290" width="200" height="66" rx="6" fill="#FED7D7" stroke="#C53030" stroke-width="1.5"/>
    <text x="880" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">train_audio_meta</text>
    <text x="880" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">.parquet</text>
    <text x="880" y="345" text-anchor="middle" font-size="10" fill="#4A5568">filename ↔ frame_idx</text>

    <rect x="780" y="380" width="200" height="66" rx="6" fill="#FED7D7" stroke="#C53030" stroke-width="1.5"/>
    <text x="880" y="402" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">soundscape_embeddings</text>
    <text x="880" y="417" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">.npy</text>
    <text x="880" y="435" text-anchor="middle" font-size="10" fill="#4A5568">(1478, 1536) · ~9 MB</text>

    <rect x="780" y="470" width="200" height="66" rx="6" fill="#FED7D7" stroke="#C53030" stroke-width="1.5"/>
    <text x="880" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">soundscape_labels</text>
    <text x="880" y="507" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">.npy</text>
    <text x="880" y="525" text-anchor="middle" font-size="10" fill="#4A5568">(1478, 234) · ~1.4 MB</text>
  </g>

  <!-- ========== ARROWS: inputs → processing ========== -->
  <path d="M 220 140 L 270 155" fill="none" stroke="#4A5568" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 220 230 L 270 240" fill="none" stroke="#4A5568" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 220 320 L 270 170" fill="none" stroke="#4A5568" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 220 410 L 270 290" fill="none" stroke="#4A5568" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 220 500 L 270 290" fill="none" stroke="#4A5568" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ========== ARROWS: inside processing ========== -->
  <line x1="500" y1="202" x2="500" y2="223" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="252" x2="500" y2="266" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="314" x2="500" y2="330" stroke="#805AD5" stroke-width="1.7" marker-end="url(#arrowPurple)"/>
  <line x1="500" y1="512" x2="500" y2="546" stroke="#805AD5" stroke-width="1.7" marker-end="url(#arrowPurple)"/>

  <!-- ========== ARROWS: processing → outputs ========== -->
  <path d="M 720 566 C 750 566, 750 143, 778 143" fill="none" stroke="#D53F8C" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 720 566 C 750 566, 750 233, 778 233" fill="none" stroke="#D53F8C" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 720 566 C 750 566, 750 323, 778 323" fill="none" stroke="#D53F8C" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 720 566 C 750 566, 750 413, 778 413" fill="none" stroke="#D53F8C" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 720 566 C 750 566, 750 503, 778 503" fill="none" stroke="#D53F8C" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ========== FOOTER ========== -->
  <rect x="20" y="620" width="960" height="120" rx="6" fill="#F7FAFC" stroke="#E2E8F0"/>

  <text x="40" y="644" font-size="12" font-weight="700" fill="#2D3748">圖例 / Legend</text>
  <rect x="40" y="655" width="16" height="12" fill="#E6FFFA" stroke="#319795"/>
  <text x="62" y="665" font-size="11" fill="#4A5568">Kaggle input data</text>
  <rect x="170" y="655" width="16" height="12" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="192" y="665" font-size="11" fill="#4A5568">Python 輔助</text>
  <rect x="290" y="655" width="16" height="12" fill="#FEFCBF" stroke="#D69E2E"/>
  <text x="312" y="665" font-size="11" fill="#4A5568">per-file loop</text>
  <rect x="410" y="655" width="16" height="12" fill="#FFF5F5" stroke="#E53E3E"/>
  <text x="432" y="665" font-size="11" fill="#4A5568">Batch buffer</text>
  <rect x="530" y="655" width="16" height="12" fill="#FAF5FF" stroke="#805AD5"/>
  <text x="552" y="665" font-size="11" fill="#4A5568">Perch (frozen)</text>
  <rect x="660" y="655" width="16" height="12" fill="#FED7D7" stroke="#C53030"/>
  <text x="682" y="665" font-size="11" fill="#4A5568">Output .npy / .parquet</text>

  <text x="40" y="698" font-size="11" fill="#4A5568">
    <tspan font-weight="700">Baseline 設計假設:</tspan>
    <tspan x="40" dy="16">• 同一個音檔的每個 5 秒 frame 共用該檔的 primary + secondary labels(檔內標註無時間粒度)</tspan>
    <tspan x="40" dy="16">• soundscape segment 嚴格按 CSV 的 (start, end) 對齊,使用 5 秒對齊的 multi-hot 標籤</tspan>
  </text>
</svg>
